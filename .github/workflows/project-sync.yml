# Typhon Development Project Sync
#
# Automatically adds new issues to the "Typhon dev" GitHub Project
# and performs basic housekeeping when issues/PRs are updated.
#
# Project: https://github.com/orgs/Log2n-io/projects/1
#
# IMPORTANT: This workflow requires a Personal Access Token (PAT) stored as
# the repository secret PROJECT_TOKEN. The default GITHUB_TOKEN cannot access
# user-level projects. Create a classic PAT with 'project' and 'repo' scopes.

name: Project Sync

on:
  issues:
    types: [opened, closed, reopened]
  pull_request:
    types: [opened, closed]

env:
  # Organization-owned project: https://github.com/orgs/Log2n-io/projects/1
  # Project ID from: gh api graphql -f query='{ organization(login: "Log2n-io") { projectV2(number: 1) { id } } }'
  PROJECT_ID: PVT_kwDOEcGj5M4Bb-8P
  # Field IDs for Status field
  STATUS_FIELD_ID: PVTSSF_lADOEcGj5M4Bb-8PzhWrH1A
  # Status option IDs (org project #1 has: Todo / In Progress / Done)
  STATUS_TODO: "f75ad846"
  STATUS_IN_PROGRESS: "47fc9ee4"
  STATUS_DONE: "98236657"

jobs:
  # Automatically add new issues to the project
  add-to-project:
    name: Add to Project
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to project
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          # Use GraphQL to add item to the org-owned project (works for both user and org projects)

          ISSUE_NODE_ID="${{ github.event.issue.node_id }}"

          gh api graphql -f query='
            mutation($project: ID!, $issue: ID!) {
              addProjectV2ItemById(input: {projectId: $project, contentId: $issue}) {
                item {
                  id
                }
              }
            }
          ' -f project="$PROJECT_ID" -f issue="$ISSUE_NODE_ID"

          echo "✅ Added issue #${{ github.event.issue.number }} to Typhon dev project"

  # Update project status when issues are closed
  update-status-on-close:
    name: Update Status on Close
    if: github.event_name == 'issues' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Update status to Done
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          ISSUE_NODE_ID="${{ github.event.issue.node_id }}"

          # Get the project item ID for this issue
          ITEM_ID=$(gh api graphql -f query='
            query($project: ID!) {
              node(id: $project) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      id
                      content {
                        ... on Issue {
                          id
                        }
                      }
                    }
                  }
                }
              }
            }
          ' -f project="$PROJECT_ID" --jq ".data.node.items.nodes[] | select(.content.id == \"$ISSUE_NODE_ID\") | .id")

          if [ -n "$ITEM_ID" ]; then
            # Update status to Done
            gh api graphql -f query='
              mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $project
                  itemId: $item
                  fieldId: $field
                  value: {singleSelectOptionId: $value}
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            ' -f project="$PROJECT_ID" -f item="$ITEM_ID" -f field="$STATUS_FIELD_ID" -f value="$STATUS_DONE"

            echo "✅ Updated issue #${{ github.event.issue.number }} status to Done"
          else
            echo "⚠️ Could not find project item for issue #${{ github.event.issue.number }}"
          fi

  # Update project status when issues are reopened
  update-status-on-reopen:
    name: Update Status on Reopen
    if: github.event_name == 'issues' && github.event.action == 'reopened'
    runs-on: ubuntu-latest
    steps:
      - name: Update status to In Progress
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          ISSUE_NODE_ID="${{ github.event.issue.node_id }}"

          # Get the project item ID for this issue
          ITEM_ID=$(gh api graphql -f query='
            query($project: ID!) {
              node(id: $project) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      id
                      content {
                        ... on Issue {
                          id
                        }
                      }
                    }
                  }
                }
              }
            }
          ' -f project="$PROJECT_ID" --jq ".data.node.items.nodes[] | select(.content.id == \"$ISSUE_NODE_ID\") | .id")

          if [ -n "$ITEM_ID" ]; then
            # Update status to In Progress
            gh api graphql -f query='
              mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $project
                  itemId: $item
                  fieldId: $field
                  value: {singleSelectOptionId: $value}
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            ' -f project="$PROJECT_ID" -f item="$ITEM_ID" -f field="$STATUS_FIELD_ID" -f value="$STATUS_IN_PROGRESS"

            echo "✅ Updated issue #${{ github.event.issue.number }} status to In Progress"
          else
            echo "⚠️ Could not find project item for issue #${{ github.event.issue.number }}"
          fi

  # Link PRs to issues and update status
  link-pr-to-issue:
    name: Link PR and Update Status
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Extract issue number and update status
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          # Extract issue number from PR title or branch name
          # Supports formats: "fix #123", "feature/123-name", "fix/123-name"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"

          # Try to extract from title first (e.g., "Fix #123: description")
          ISSUE_NUM=$(echo "$PR_TITLE" | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)

          # If not found, try branch name (e.g., "feature/123-name" or "fix/123-name")
          if [ -z "$ISSUE_NUM" ]; then
            ISSUE_NUM=$(echo "$PR_BRANCH" | grep -oE '(feature|fix)/[0-9]+' | grep -oE '[0-9]+' || true)
          fi

          if [ -n "$ISSUE_NUM" ]; then
            echo "Found linked issue: #$ISSUE_NUM"

            # Get issue node ID
            ISSUE_NODE_ID=$(gh api "/repos/${{ github.repository }}/issues/$ISSUE_NUM" --jq '.node_id')

            if [ -n "$ISSUE_NODE_ID" ]; then
              # Get the project item ID
              ITEM_ID=$(gh api graphql -f query='
                query($project: ID!) {
                  node(id: $project) {
                    ... on ProjectV2 {
                      items(first: 100) {
                        nodes {
                          id
                          content {
                            ... on Issue {
                              id
                            }
                          }
                        }
                      }
                    }
                  }
                }
              ' -f project="$PROJECT_ID" --jq ".data.node.items.nodes[] | select(.content.id == \"$ISSUE_NODE_ID\") | .id")

              if [ -n "$ITEM_ID" ]; then
                # Update status to In Progress (org project #1 has no Review status)
                gh api graphql -f query='
                  mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $project
                      itemId: $item
                      fieldId: $field
                      value: {singleSelectOptionId: $value}
                    }) {
                      projectV2Item {
                        id
                      }
                    }
                  }
                ' -f project="$PROJECT_ID" -f item="$ITEM_ID" -f field="$STATUS_FIELD_ID" -f value="$STATUS_IN_PROGRESS"

                echo "✅ Updated issue #$ISSUE_NUM status to In Progress"
              fi
            fi
          else
            echo "ℹ️ No issue number found in PR title or branch name"
          fi

  # Update status when PR is merged
  update-on-merge:
    name: Update Status on Merge
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Update linked issue status
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"

          # Extract issue number
          ISSUE_NUM=$(echo "$PR_TITLE" | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
          if [ -z "$ISSUE_NUM" ]; then
            ISSUE_NUM=$(echo "$PR_BRANCH" | grep -oE '(feature|fix)/[0-9]+' | grep -oE '[0-9]+' || true)
          fi

          if [ -n "$ISSUE_NUM" ]; then
            echo "PR merged, updating issue #$ISSUE_NUM"

            # Close the issue
            gh issue close $ISSUE_NUM --repo ${{ github.repository }} || true

            # Get issue node ID
            ISSUE_NODE_ID=$(gh api "/repos/${{ github.repository }}/issues/$ISSUE_NUM" --jq '.node_id')

            if [ -n "$ISSUE_NODE_ID" ]; then
              # Get project item and update status to Done
              ITEM_ID=$(gh api graphql -f query='
                query($project: ID!) {
                  node(id: $project) {
                    ... on ProjectV2 {
                      items(first: 100) {
                        nodes {
                          id
                          content {
                            ... on Issue {
                              id
                            }
                          }
                        }
                      }
                    }
                  }
                }
              ' -f project="$PROJECT_ID" --jq ".data.node.items.nodes[] | select(.content.id == \"$ISSUE_NODE_ID\") | .id")

              if [ -n "$ITEM_ID" ]; then
                gh api graphql -f query='
                  mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $project
                      itemId: $item
                      fieldId: $field
                      value: {singleSelectOptionId: $value}
                    }) {
                      projectV2Item {
                        id
                      }
                    }
                  }
                ' -f project="$PROJECT_ID" -f item="$ITEM_ID" -f field="$STATUS_FIELD_ID" -f value="$STATUS_DONE"

                echo "✅ Issue #$ISSUE_NUM marked as Done"
              fi
            fi
          else
            echo "ℹ️ No issue number found in PR title or branch name"
          fi
