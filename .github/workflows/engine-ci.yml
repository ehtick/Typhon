name: Engine CI

# Enforces the Minimal-WAL program metric (#393): "One True Crash Test + full crash sweep green AND in CI".
# Runs the durability crash sweep (Category=CrashSweep) + the One True Crash Test (TrueCrashE2ETests).
# Deliberately scoped: the full Typhon.Engine.Tests suite has ~20 pre-existing reds (stress/#133/env flakes + the
# SV-durability P2 known-issue) that are an H-track concern — a full-suite gate is out of scope here. This job FAILS
# on any red in its scope (no `|| true`): the crash-recovery proof is enforced, not merely observed.

on:
  # `push` limited to main so we don't double-run on PR branches — `pull_request` already covers feature branches.
  push:
    branches: [main]
    paths:
      - 'src/Typhon.Engine/**'
      - 'test/Typhon.Engine.Tests/**'
      - 'Typhon.slnx'
      - '.github/workflows/engine-ci.yml'
  pull_request:
    paths:
      - 'src/Typhon.Engine/**'
      - 'test/Typhon.Engine.Tests/**'
      - 'Typhon.slnx'
      - '.github/workflows/engine-ci.yml'
  workflow_dispatch:

# Back-to-back pushes within a PR kill the older run instead of queueing.
concurrency:
  group: engine-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  crash-recovery:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: dotnet restore
        run: dotnet restore Typhon.slnx

      - name: dotnet build (Release)
        run: dotnet build test/Typhon.Engine.Tests/Typhon.Engine.Tests.csproj -c Release --no-restore

      # The full crash sweep (A1.2) + the One True Crash Test (A1.1). No `|| true` — a red FAILS the job.
      - name: dotnet test (crash sweep + One True Crash)
        run: >-
          dotnet test test/Typhon.Engine.Tests/Typhon.Engine.Tests.csproj
          -c Release --no-build
          --filter "Category=CrashSweep|FullyQualifiedName~TrueCrashE2ETests"
