name: Merge Gate

# The single required PR check. Detects changed areas, runs the heavy correctness suites on an
# ephemeral c6id.8xlarge via SkyPilot (engine / workbench / coverage) and the TLA+ specs on a free
# runner, then an aggregate `gate` job reports one definitive green/red.
# Design + rationale: claude/design/Infrastructure/ci-merge-gate.md
#
# Folds in the retired engine-ci.yml + workbench-ci.yml.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Back-to-back pushes within a PR cancel the older run instead of queueing.
concurrency:
  group: merge-gate-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---- Change detection: emit boolean flags consumed by the heavy jobs + passed to the VM. ----
  changes:
    runs-on: ubuntu-latest
    outputs:
      engine: ${{ steps.filter.outputs.engine }}
      workbench: ${{ steps.filter.outputs.workbench }}
      tla: ${{ steps.filter.outputs.tla }}
      # `[no-ut]` in the PR head commit message → skip the heavy aws-gate suites (self-declared small-fix bypass).
      skip_ut: ${{ steps.ut.outputs.skip_ut }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            engine:
              - 'src/Typhon.Engine/**'
              - 'test/Typhon.Engine.Tests/**'
            workbench:
              - 'tools/Typhon.Workbench/**'
            tla:
              - 'src/Typhon.Engine/Durability/**'

      # Opt-out for genuine small fixes: `[no-ut]` in the head commit message skips the heavy aws-gate
      # unit-test suites. Reads pull_request.head.sha (NOT the working-tree HEAD — on a PR that is the
      # synthetic merge commit, whose auto-message never carries the token); falls back to github.sha on push.
      - name: Detect [no-ut] skip token
        id: ut
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA='${{ github.event.pull_request.head.sha || github.sha }}'
          MSG=$(gh api "repos/${{ github.repository }}/commits/$SHA" --jq '.commit.message')
          if grep -qiE '\[no-ut\]' <<<"$MSG"; then
            echo "skip_ut=true" >> "$GITHUB_OUTPUT"
            echo "::notice::[no-ut] found in $SHA — skipping the aws-gate unit-test suites."
          else
            echo "skip_ut=false" >> "$GITHUB_OUTPUT"
          fi

  # ---- Heavy correctness suites on the c6id (engine / workbench / coverage). ----
  aws-gate:
    needs: changes
    # Default (SkyPilot ephemeral) path — skipped when the persistent self-hosted runner is enabled (repo variable
    # GATE_RUNNER=selfhosted, #466); the aws-gate-selfhosted job below runs instead. Rollback = unset the variable.
    if: >-
      (needs.changes.outputs.engine == 'true' || needs.changes.outputs.workbench == 'true')
      && needs.changes.outputs.skip_ut != 'true'
      && vars.GATE_RUNNER != 'selfhosted'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-west-1
    steps:
      - uses: actions/checkout@v4

      - name: Install SkyPilot
        run: python3 -m pip install --quiet "skypilot[aws]"

      # Blocking launch: sky propagates the VM's run: exit code, so a test failure on the VM
      # fails this step → this job → the gate. --down tears the instance down either way.
      - name: Run correctness gate on c6id
        run: |
          sky launch bench/aws/ci.sky.yaml --down -y \
            --env RUN_ENGINE=${{ needs.changes.outputs.engine }} \
            --env RUN_WORKBENCH=${{ needs.changes.outputs.workbench }} \
            --env RUN_ID=${{ github.run_id }}

      # if: always() — we want the report surfaced precisely when the gate FAILED.
      - name: Pull reports from S3
        if: always()
        run: |
          mkdir -p ci-out
          aws s3 sync "s3://typhon-traces/ci/${{ github.run_id }}/" ci-out/ || true

      - name: Render report on the check page
        if: always()
        run: |
          if [ -f ci-out/summary.md ]; then
            cat ci-out/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No summary produced (the VM may have failed before writing one)._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload raw artifacts (.trx / coverage / logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: ci-out/**
          if-no-files-found: ignore

  # ---- Same gate, on the PERSISTENT self-hosted c6id (repo variable GATE_RUNNER=selfhosted). DORMANT until the
  #      box + power-toggle exist — see bench/aws/runner/ + design/Infrastructure/ci-gate-persistent-runner.md (#466).
  #      Warm toolchain + bin/obj on the box → incremental build; test DBs on the local NVMe (TMPDIR=/nvme). ----
  aws-gate-selfhosted:
    needs: changes
    if: >-
      (needs.changes.outputs.engine == 'true' || needs.changes.outputs.workbench == 'true')
      && needs.changes.outputs.skip_ut != 'true'
      && vars.GATE_RUNNER == 'selfhosted'
    runs-on: [self-hosted, linux, typhon-c6id]
    steps:
      # clean:false keeps the warm bin/obj (untracked) for an incremental build; test DBs live on /nvme (TMPDIR),
      # not the worktree, so nothing accumulates there. git reset --hard reverts any tracked edits for isolation.
      - name: Checkout (keep warm bin/obj)
        uses: actions/checkout@v4
        with:
          clean: false
      - name: Run correctness gate on the persistent c6id
        env:
          RUN_ENGINE: ${{ needs.changes.outputs.engine }}
          RUN_WORKBENCH: ${{ needs.changes.outputs.workbench }}
          RUN_ID: ${{ github.run_id }}
          TMPDIR: /nvme
        run: |
          git reset --hard HEAD
          OUT="$(pwd)/ci-out" REPO="$(pwd)" bash bench/aws/run-gate.sh
      - name: Render report on the check page
        if: always()
        run: |
          if [ -f ci-out/summary.md ]; then
            cat ci-out/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No summary produced (the gate may have failed before writing one)._" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload raw artifacts (.trx / coverage / logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: ci-out/**
          if-no-files-found: ignore

  # ---- TLA+ specs on a free runner (Java only — must NOT consume the c6id). ----
  tla:
    needs: changes
    if: ${{ needs.changes.outputs.tla == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The specs live in the separate typhon-claude repo (claude/ is gitignored here).
      - name: Checkout typhon-claude (TLA specs)
        uses: actions/checkout@v4
        with:
          repository: Log2n-io/Typhon-Claude
          # Cross-repo private checkout: the default GITHUB_TOKEN is scoped to this repo only and 404s on Typhon-Claude.
          # A fine-grained PAT (Contents:read on Typhon-Claude) resolves the ref and auths the fetch. ref pins to main.
          ref: main
          token: ${{ secrets.TYPHON_CLAUDE_TOKEN }}
          path: typhon-claude

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'    # runs the pinned tla2tools v1.7.4

      - name: Model-check all specs + genuineness mutants
        # Typhon-Claude's repo root IS the claude/ content, so the specs sit at rules/tla (no extra claude/ segment).
        working-directory: typhon-claude/rules/tla
        run: |
          set -e
          # Invoke via `bash` (not ./) so a missing exec bit — common when the script is committed from Windows —
          # doesn't fail the run with "Permission denied".
          for spec in CheckpointProtocol CommitRecovery CommittedDiscipline; do
            echo "::group::TLC $spec (expect GREEN)"
            bash run-tlc.sh "$spec"
            echo "::endgroup::"
            echo "::group::TLC $spec mutant (expect VIOLATION)"
            bash run-tlc.sh "$spec" mutant --expect-violation
            echo "::endgroup::"
          done

  # ---- Guard: a closing keyword that would auto-close a PULL REQUEST on merge. ----
  #
  # GitHub scans the PR description and every commit message for a bare `KEYWORD #N` adjacency
  # (close/closes/closed, fix/fixes/fixed, resolve/resolves/resolved) and closes #N when the PR merges
  # into the default branch. The parser has NO notion of negation — "does not retroactively fix #482"
  # links and closes exactly like "fixes #482" — and because pull requests and issues share one
  # numbering space, #N resolving to a PR closes that PR. That is not hypothetical: PR #483's body said
  # "does not retroactively fix #482", which silently closed the unrelated in-flight PR #482 on merge.
  # There is no repo/org setting to disable closing keywords, so this check is the only systemic defense.
  #
  # Fails ONLY when the referenced number is a pull request — `Closes #123` on a real issue is the
  # intended, everyday use and stays green.
  closing-keywords:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Reject closing keywords that target a pull request
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          # Untrusted, user-controlled — passed via env, NEVER inlined into the shell body (script injection).
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -uo pipefail

          # Same two surfaces GitHub itself parses: the PR description and the branch's commit messages.
          # (Squash-merge concatenates commit messages into the squash body, so a stray keyword in any
          # commit on the branch is just as live as one in the description.)
          #
          # The description is Markdown, and GitHub does NOT parse references inside fenced blocks or
          # inline code spans — so strip those first. Without this the guard flags any doc that merely
          # *quotes* a closing keyword, including the backticked form its own error message recommends.
          BODY=$(printf '%s\n' "$PR_BODY" \
            | awk 'BEGIN { fence = 0 } /^[[:space:]]*```/ { fence = !fence; next } !fence' \
            | sed 's/`[^`]*`//g')

          # Commit messages are plain text to GitHub's parser — backticks do NOT defuse a keyword there.
          # So they are scanned raw, with no stripping.
          COMMITS=$(gh api "repos/$REPO/pulls/$PR_NUM/commits" --paginate --jq '.[].commit.message')

          TEXT=$(printf '%s\n%s\n' "$BODY" "$COMMITS")

          # KEYWORD, optional colon, whitespace, #N — GitHub's adjacency rule. An intervening word
          # ("fix PR #482") breaks the link and is therefore correctly NOT matched here either.
          # The leading (^|[^[:alnum:]_]) is a word boundary: without it, "postfix #482" trips on the
          # trailing "fix". Spelled out rather than \b so it does not depend on GNU-grep extensions.
          #
          # The trailing `|| true` is load-bearing. The step's shell is `bash -e` and we add pipefail, so
          # a grep that matches NOTHING (exit 1 — i.e. the healthy, common case) would propagate and kill
          # the script before it prints anything, failing every clean PR. Do not remove it.
          NUMS=$(printf '%s\n' "$TEXT" \
            | grep -oiE '(^|[^[:alnum:]_])(close[sd]?|fix(es|ed)?|resolve[sd]?)[[:space:]]*:?[[:space:]]+#[0-9]+' \
            | grep -oE '#[0-9]+' | tr -d '#' | sort -un || true)

          if [ -z "$NUMS" ]; then
            echo "No closing keywords found — nothing to check."
            exit 0
          fi

          fail=0
          for n in $NUMS; do
            kind=$(gh api "repos/$REPO/issues/$n" --jq 'if .pull_request then "pr" else "issue" end' 2>/dev/null || echo missing)
            case "$kind" in
              pr)
                echo "::error::Closing keyword targets #$n, which is a PULL REQUEST — merging would auto-close it. Defuse the reference: backtick it (\`#$n\`), write 'PR #$n', or rephrase."
                fail=1
                ;;
              missing)
                echo "::warning::Closing keyword targets #$n, which does not exist in $REPO."
                ;;
              *)
                echo "ok: #$n is an issue — will be closed on merge, as intended."
                ;;
            esac
          done

          if [ "$fail" -ne 0 ]; then
            {
              echo "### ❌ Closing keyword targets a pull request"
              echo
              echo "GitHub would auto-close it when this PR merges. Its parser matches a bare \`KEYWORD #N\`"
              echo "adjacency and **ignores negation** — \`does not fix #N\` closes #N just like \`fixes #N\`."
              echo
              echo "Fix by breaking the adjacency in the PR description (or the offending commit message):"
              echo "- \`\\\`#N\\\`\` — backticks"
              echo "- \`PR #N\` / \`pull request #N\` — an intervening word"
              echo "- rephrase to avoid close/fix/resolve before the reference"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "Closing keywords: all target issues. OK."

  # ---- The ONLY required check. Aggregates: skipped → pass, failure/cancelled → fail. ----
  gate:
    needs: [changes, aws-gate, aws-gate-selfhosted, tla, closing-keywords]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Compute verdict
        run: |
          changes='${{ needs.changes.result }}'
          aws='${{ needs.aws-gate.result }}'
          awssh='${{ needs.aws-gate-selfhosted.result }}'
          tla='${{ needs.tla.result }}'
          keywords='${{ needs.closing-keywords.result }}'
          echo "changes=$changes  aws-gate=$aws  aws-gate-selfhosted=$awssh  tla=$tla  closing-keywords=$keywords"
          fail=0
          # changes must succeed; the two aws-gate variants + tla may legitimately be 'skipped' (nothing relevant
          # changed, or the other runner variant is inactive), and closing-keywords is 'skipped' on push/dispatch.
          [ "$changes" = "success" ] || { echo "change-detection failed"; fail=1; }
          case "$aws" in failure|cancelled) echo "aws-gate failed"; fail=1 ;; esac
          case "$awssh" in failure|cancelled) echo "aws-gate-selfhosted failed"; fail=1 ;; esac
          case "$tla" in failure|cancelled) echo "tla failed"; fail=1 ;; esac
          case "$keywords" in failure|cancelled) echo "closing-keywords guard failed"; fail=1 ;; esac
          if [ "$fail" -ne 0 ]; then echo "Merge gate: RED"; exit 1; fi
          echo "Merge gate: GREEN"
